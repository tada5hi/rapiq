<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" fill="none" role="img" aria-label="rapiq — REST API Query">
    <defs>
        <clipPath id="frame">
            <rect width="800" height="240" rx="24"/>
        </clipPath>
        <linearGradient id="mark" x1="0" y1="64" x2="64" y2="0" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#7c3aed"/>
            <stop offset="1" stop-color="#06b6d4"/>
        </linearGradient>
        <linearGradient id="shine" x1="32" y1="0" x2="32" y2="40" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
            <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
        </linearGradient>
        <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="48"/>
        </filter>
    </defs>

    <rect width="800" height="240" rx="24" fill="#0b1120"/>
    <g clip-path="url(#frame)">
        <ellipse cx="160" cy="20" rx="240" ry="130" fill="#7c3aed" opacity="0.42" filter="url(#glow)"/>
        <ellipse cx="650" cy="235" rx="250" ry="130" fill="#06b6d4" opacity="0.30" filter="url(#glow)"/>
    </g>

    <!-- brand mark: magnifier over filter lines -->
    <g transform="translate(368 30)">
        <rect width="64" height="64" rx="16" fill="url(#mark)"/>
        <rect width="64" height="64" rx="16" fill="url(#shine)"/>
        <g stroke="#ffffff" stroke-linecap="round">
            <circle cx="28" cy="28" r="12.7" stroke-width="4.7"/>
            <path d="M37.3 37.3 49.3 49.3" stroke-width="4.7"/>
            <path d="M22 24.7h12M24 29.3h8M26 34h4" stroke-width="2.7"/>
        </g>
    </g>

    <text x="400" y="146" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="54" font-weight="800" letter-spacing="-1.5" fill="#f1f5f9">rapiq</text>
    <text x="400" y="180" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="17" font-weight="500" fill="#94a3b8">One typed query language — from client to database.</text>
    <text x="400" y="210" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#64748b">?fields=id,name&amp;filter[age]=&gt;=18&amp;include=realm&amp;page[limit]=20&amp;sort=-name</text>

    <rect x="0.5" y="0.5" width="799" height="239" rx="23.5" stroke="#94a3b8" stroke-opacity="0.16"/>
</svg>
